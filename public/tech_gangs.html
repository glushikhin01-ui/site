<!doctype html>
<html lang="ru">
<head>
  <base href="/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arizona • Тех.Раздел · Банды</title>
  <link rel="icon" type="image/png" href="./img/logo.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#eab308">
  <script>(function(){try{if(localStorage.getItem("arizona_theme")==="blue")document.documentElement.setAttribute("data-theme","blue")}catch(e){}})();</script>
  <link rel="stylesheet" href="fonts.css?v=3" />
  <link rel="stylesheet" href="style.css?v=31" />
</head>
<body>
<div class="toastWrap" id="toastWrap"></div>
<div class="appScale"><div class="app">
  <aside class="side">
    <div class="brand"><img class="brandLogo" src="./img/logo.png" alt="Arizona"><div class="brandText"><div class="brandTitle">Arizona</div><div class="brandSub">Web Panel</div></div></div>
    <nav class="nav">
      <a class="navItem" data-perm="view_players" data-lock-page="/" href="/">Игроки</a>
      <a class="navItem" data-perm="view_bans" data-lock-page="/bans" href="/bans">Баны</a>
      <a class="navItem" data-perm="view_stats" data-lock-page="/stats" href="/stats">Статистика</a>
      <a class="navItem" data-perm="view_admin_logs" data-lock-page="/admin-logs" href="/admin-logs">Логи админов</a>
      <a class="navItem" data-perm="view_blacklist" data-lock-page="/blacklist" href="/blacklist">Черный список проекта</a>
      <a class="navItem" data-perm="view_promos" data-lock-page="/promos" href="/promos">Промокоды</a>
      <a class="navItem" data-perm="manage_zbt_access" data-lock-page="/zbt-access" href="/zbt-access">Доступ ЗБТ</a>
      <a class="navItem" data-manage-hub="1" data-lock-page="/manage" href="/manage">Управление</a>
      <a class="navItem" href="#" id="logoutBtn">Выход</a>
    </nav>
    <div class="sideBottom" style="display:flex;align-items:center;gap:10px;justify-content:space-between"><div class="sideStatus" id="apiStatus">API: ...</div><button id="themeToggle" class="themeToggle" type="button" title="Сменить тему">☀️</button></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div><div class="h1">Тех.Раздел · Банды</div></div>
      <div class="tools">
        <input id="gangQ" class="input" placeholder="Название / владелец / SteamID / описание" />
        <select id="gangSystem" class="select"><option value="all">Все системы</option><option value="f4">F4 gangs</option><option value="legacy">gangs</option></select>
        <button id="gangRefresh" class="btn">Обновить</button>
      </div>
    </div>
    <div class="techCards" id="gangStats"></div>
    <div class="card">
      <div class="muted" id="gangCount">Загрузка...</div>
      <div class="gangGrid" id="gangGrid"></div>
      <div class="err" id="gangErr" style="display:none">Ошибка загрузки банд</div>
    </div>
  </main>
</div></div>
<script src="ui.js?v=13"></script>
<script src="auth.js?v=8"></script>
<script src="tech_gangs.js?v=4"></script>
<script src="lock_notice.js?v=1"></script>
</body>
</html>
